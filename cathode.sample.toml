[general]
# Theme files to import — paths starting with ~/ expand to $HOME/.
import = [
    "~/.config/cathode/themes/{theme}.toml"
]

# Auto-reload config on file change (default: true).
auto_reload = true

[terminal]
scrollback = 2000

# Cursor blink mode: "on", "off", or "system" (follow GTK).
# Default: on
cursor_blink = "on"

[shell]
program = "/bin/zsh"
# args = []

[env]
TERM = "xterm-256color"

[font]
family = "monospace"
# style = "Regular"
size = 12

# CRT retro effects — set any value to 0 to disable.
[crt]
# Scanline profile: 0 = gaussian beam (smooth), 1 = square wave (harsh).
# Default: 0
# scanline_mode = 0

# Scanline darkness. (0.0–1.0).
# Default: 0.12
scanline_intensity = 0.12

# Pixel rows per scanline group.
# Default: 6.0
scanline_period = 6.0

# 2D gaussian bloom blend factor (retro.hlsl style). (0.0–1.0).
# Default: 0.30
bloom_strength = 0.30

# Bloom gaussian sigma — higher = wider glow.
# Default: 4.5
bloom_sigma = 4.5

# Warm P22 phosphor glow intensity on bright text.
# Default: 0.2
glow_strength = 0.2

# Glow min luma threshold. (0.0–1.0).
# Default: 0.0
glow_threshold_low = 0.0

# Glow full-strength luma threshold. (0.0–1.0).
# Default: 1.0
glow_threshold_high = 1.0

# Trinitron RGB vertical stripe mask visibility. (0.0–0.03).
# Default: 0.012
mask_strength = 0.012

# Barrel distortion strength for curved screen. (0.0–0.08).
# Default: 0.0 (off)
# curvature = 0.03

# RGB convergence error at screen edges. (0.0–0.001).
# Default: 0.0 (off)
# chromatic_aberration = 0.0005

# Sub-pixel gaussian softening of pixel edges. (0.0–0.3).
# Default: 0.12
softening = 0.12

# Horizontal phosphor-trail color smear. (0.0–0.2).
# Default: 0.08
color_bleed = 0.08

# 2D gaussian beam spot — rounded pixel appearance. (0.0–0.4).
# Default: 0.15
rounding = 0.15

# Bezel shadow + inner depth darkening at edges. (0.0–0.3).
# Default: 0.10
shadow_strength = 0.10

# Glass-depth corner darkening, independent of curvature. (0.0–0.5).
# Default: 0.0 (off)
# vignette_strength = 0.25

# CPU-side phosphor persistence / afterimage ghosting. (0.0–0.2).
# Default: 0.0 (off)
burn_in = 0.0

# Phosphor coating noise / grain. (0.0–0.01).
# Default: 0.005
film_grain = 0.005

# Random sub-pixel beam jitter (analog instability). (0.0–0.01).
# Default: 0.0 (off)
# jitter = 0.005

# Global brightness modulation (PSU ripple). (0.0–0.3).
# Default: 0.0 (off)
# flickering = 0.1

# Scrolling bright horizontal scanline overlay. (0.0–0.5).
# Default: 0.0 (off)
# glowing_line = 0.2

[bindings]
keys = [
  { key = "C", with = "Control | alt", action = "Copy" },
  { key = "V", with = "Control | alt", action = "Paste" },
  { key = "PageUp", with = "alt", action = "ScrollPageUp" },
  { key = "PageDown", with = "alt", action = "ScrollPageDown" },
  { key = "Up", with = "alt", action = "ScrollUp" },
  { key = "Down", with = "alt", action = "ScrollDown" },
  { key = "Equal", with = "Control", action = "IncreaseFontSize" },
  { key = "Minus", with = "Control", action = "DecreaseFontSize" },
  { key = "Digit0", with = "Control | alt", action = "ResetFontSize" },
  { key = "Enter", with = "Control | alt", action = "Toggle3DMode" },
  { key = "M", with = "Control | alt", action = "ToggleMobiusMode" },
  { key = "Up", with = "Control | alt", action = "IncreaseWarp" },
  { key = "Down", with = "Control | alt", action = "DecreaseWarp" },
]
